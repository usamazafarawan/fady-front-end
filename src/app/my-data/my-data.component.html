<h2>Student List</h2>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Class</th>
      <th>Marks</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let student of students">
      <td>{{ student.id }}</td>
      <td>{{ student.name }}</td>
      <td>{{ student.class }}</td>
      <td>{{ student.marks }}</td>
      <td>
        <!-- <button (click)="editStudent(student)">Edit</button> -->
        <button (click)="deleteStudent(student.id)">Delete</button>
        </td>
    </tr>
  </tbody>
</table>
