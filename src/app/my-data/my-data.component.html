<app-header></app-header> 

<h2>Student List</h2>

<h4>the value from the contact component is {{componentValue}}  </h4>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Class</th>
      <th>Marks</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let student of students">
      <td>{{ student?.Id || student?.id }}</td>
      <td>{{ student?.Name || student?.name }}</td>
      <td>{{ student?.Class || student?.class}}</td>
      <td>{{ student?.Marks || student?.marks }}</td>
      <td>
        <!-- <button (click)="editStudent(student)">Edit</button> -->
        <button (click)="deleteStudent(student?.Id || student?.id)">Delete</button>
        </td>
    </tr>
  </tbody>
</table>



 <app-footer>  </app-footer>
