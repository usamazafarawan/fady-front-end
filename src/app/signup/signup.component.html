<div class="signup-container">
    <div class="signup-card">
        <h2>Sign Up</h2>

        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="firstName" formControlName="firstName" />

                <small class="error"
                    *ngIf="signupForm.get('firstName')?.touched && signupForm.get('firstName')?.invalid ">
                    First Name is Required
                </small>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lastName" formControlName="lastName" />
                <small class="error"
                    *ngIf="signupForm.get('lastName')?.touched && signupForm.get('lastName')?.invalid ">
                    Last Name is Required
                </small>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" formControlName="email" />
                <small class="error" *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.invalid ">
                    Email Name is Required
                </small>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select formControlName="role" name="role" required>
                    <option value="">Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                </select>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input formControlName="password" type="password" name="password" required />
                <small class="error"
                    *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid ">
                    Password is Required
                </small>
            </div>

            <button type="submit">
                Sign Up
            </button>

        </form>


    </div>
</div>
