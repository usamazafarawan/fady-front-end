<div class="login-container">
    <div class="login-card">
        <h2>Login</h2>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>Email</label>
                <input formControlName="email" type="email" placeholder="Enter your email" />
                <small class="error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid ">
                    Email Name is Required
                </small>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input formControlName="password" type="password" placeholder="Enter your password" />

                <small class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid ">
                    Password is Required
                </small>
            </div>

            <button type="submit">Login</button>
        </form>

        <p class="footer-text">
            Don't have an account? <span>Sign up</span>
        </p>
    </div>
</div>
